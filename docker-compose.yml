services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: asdf
      POSTGRES_PASSWORD: asdf
      POSTGRES_DB: todos
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asdf -d todos"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://asdf:asdf@db:5432/todos
      PORT: 8000
      HOST: 0.0.0.0
    depends_on:
      db:
        condition: service_healthy
