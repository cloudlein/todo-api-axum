name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: asdf
          POSTGRES_PASSWORD: asdf
          POSTGRES_DB: todos
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache dependencies
      uses: swatinem/rust-cache@v2

    - name: Check formatting
      run: cargo fmt -- --check

    - name: Clippy linting
      run: cargo clippy -- -D warnings

    - name: Run migrations
      # Assuming DATABASE_URL is set for migrations
      run: |
        cargo install sqlx-cli --no-default-features --features native-tls,postgres
        sqlx migrate run
      env:
        DATABASE_URL: postgres://asdf:asdf@localhost:5432/todos

    - name: Run tests
      run: cargo test --verbose
      env:
        DATABASE_URL: postgres://asdf:asdf@localhost:5432/todos
